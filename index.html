<!DOCTYPE html>
<html>
<head>
  <title>Warehouse Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial; padding: 15px; }
    h1, h2 { text-align: center; }

    .aisle { border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; }

    button { padding: 8px; margin: 3px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 250px;
      margin: auto;
    }

    .bin {
      border: 1px solid black;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      border-radius: 6px;
    }

    .red { background: #fca5a5; }
    .yellow { background: #fde68a; }
    .green { background: #86efac; }

    input {
      display: block;
      margin: 10px auto;
      padding: 6px;
      width: 80%;
      font-size: 16px;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>Warehouse Overview</h1>
<div id="app"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCNmQYztjeWvUmteF8S67MaReW-AjIzj_8",
  authDomain: "warehouse-app-38a03.firebaseapp.com",
  projectId: "warehouse-app-38a03",
  storageBucket: "warehouse-app-38a03.firebasestorage.app",
  messagingSenderId: "854063247545",
  appId: "1:854063247545:web:dd44bfde0b9df87cd76b68"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const AISLES = [1,2,3,4];
const SECTIONS = 5;
const BINS = 12;

let current = "overview";
let selected = {};
let data = {};
let search = "";

// 🔥 Real-time sync
db.collection("bins").onSnapshot(snapshot => {
  data = {};
  snapshot.forEach(doc => {
    data[doc.id] = doc.data();
  });
  render();
});

function getColor(item) {
  if (!item) return "red";
  if (item.qty < 5) return "yellow";
  return "green";
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  // 🔍 SEARCH BAR (always visible)
  let searchBox = document.createElement("input");
  searchBox.placeholder = "Search product...";
  searchBox.value = search;

  searchBox.oninput = (e) => {
    search = e.target.value.toLowerCase();
    render();
  };

  app.appendChild(searchBox);

  // ✅ OVERVIEW
  if (current === "overview") {
    AISLES.forEach(a => {
      let wrapper = document.createElement("div");
      wrapper.className = "aisle";

      let title = document.createElement("h2");
      title.innerText = "Aisle " + a;
      wrapper.appendChild(title);

      let sides = (a === 4) ? ["A"] : ["A","B"];

      sides.forEach(s => {
        let label = document.createElement("div");
        label.innerHTML = "<strong>Side " + s + "</strong>";
        wrapper.appendChild(label);

        for (let i=1;i<=SECTIONS;i++) {
          let btn = document.createElement("button");
          btn.innerText = "S" + i;

          btn.onclick = () => {
            selected = {a,s,section:i};
            current = "shelf";
            render();
          };

          wrapper.appendChild(btn);
        }
      });

      app.appendChild(wrapper);
    });
  }

  // ✅ SHELF VIEW
  if (current === "shelf") {
    let back = document.createElement("button");
    back.innerText = "⬅ Back";
    back.onclick = () => { current="overview"; render(); };
    app.appendChild(back);

    let title = document.createElement("h2");
    title.innerText = `Aisle ${selected.a}${selected.s} - Section ${selected.section}`;
    app.appendChild(title);

    let grid = document.createElement("div");
    grid.className = "grid";

    for (let i=0;i<BINS;i++) {
      let id = `${selected.a}${selected.s}-${selected.section}-${String(i+1).padStart(2,"0")}`;
      let item = data[id];

      let box = document.createElement("div");
      box.className = "bin " + getColor(item);
      box.innerText = id;

      // 🔍 Highlight search match
